<!doctype html>
<html lang="en" suppresshydrationwarning>
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("aether-theme");
          var dark =
            t === "dark" ||
            (t !== "light" && (t === "system" || !t) && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
          var m = document.getElementById("theme-color-meta");
          if (m) m.setAttribute("content", dark ? "#08080A" : "#f6f5f3");
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta id="theme-color-meta" name="theme-color" content="#08080A" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Privacy-friendly analytics (Plausible): no cookies, no consent banner
         needed, GDPR/LFPDPPP-friendly. Add the site at https://plausible.io and
         it starts reporting; until then it's a harmless no-op. Localhost is
         ignored automatically. The queue stub lets us fire events (see
         src/lib/analytics.ts) before the script finishes loading. -->
    <script defer data-domain="aetherml.com" src="https://plausible.io/js/script.js"></script>
    <script>
      window.plausible = window.plausible || function () { (window.plausible.q = window.plausible.q || []).push(arguments); };
    </script>

    <title>Æther · Automation Studio</title>
    <meta
      name="description"
      content="Æther designs custom automations, integrations, and payment reconciliation for businesses that have outgrown manual work. Based in Guadalajara, working with teams everywhere."
    />
    <meta name="author" content="Æther" />

    <!-- Canonical is asserted per-route via react-helmet-async so each route
         (/, /privacy, /terms, future posts) emits a single, correct canonical
         rather than the homepage URL leaking onto every SPA route. -->
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Æther" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="es_MX" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aetherml.com/" />
    <meta property="og:title" content="Æther · Automation Studio" />
    <meta
      property="og:description"
      content="Æther designs custom automations, integrations, and payment reconciliation for businesses that have outgrown manual work. Based in Guadalajara, working with teams everywhere."
    />
    <meta
      property="og:image"
      content="https://aetherml.com/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Æther — Manual work, engineered away. Automation studio in Guadalajara." />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@AEtherML" />
    <meta name="twitter:creator" content="@AEtherML" />
    <meta name="twitter:title" content="Æther · Automation Studio" />
    <meta
      name="twitter:description"
      content="Æther designs custom automations, integrations, and payment reconciliation for businesses that have outgrown manual work. Based in Guadalajara, working with teams everywhere."
    />
    <meta
      name="twitter:image"
      content="https://aetherml.com/og-image.png"
    />
    <meta name="twitter:image:alt" content="Æther — Manual work, engineered away." />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://aetherml.com/#org",
            "name": "Æther",
            "url": "https://aetherml.com/",
            "logo": "https://aetherml.com/web-app-manifest-512x512.png",
            "sameAs": ["https://twitter.com/AEtherML"],
            "email": "help@aetherml.com",
            "description": "Custom automations, integrations, and payment reconciliation for businesses that have outgrown manual work."
          },
          {
            "@type": "WebSite",
            "@id": "https://aetherml.com/#site",
            "url": "https://aetherml.com/",
            "name": "Æther",
            "publisher": { "@id": "https://aetherml.com/#org" },
            "inLanguage": ["en", "es"]
          },
          {
            "@type": "ProfessionalService",
            "name": "Æther · Business Automation Studio",
            "provider": { "@id": "https://aetherml.com/#org" },
            "areaServed": ["MX", "US", "LATAM"],
            "priceRange": "$$$",
            "serviceType": [
              "Custom Automations",
              "System Integrations",
              "Payment Reconciliation",
              "Digital Presence",
              "Process Optimization"
            ]
          },
          {
            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "How fast do you ship?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "First automation live within 2-3 weeks of kickoff. Most engagements deliver measurable hours saved inside 30 days, not the 6-month rollouts you'd get from a traditional agency."
                }
              },
              {
                "@type": "Question",
                "name": "Will this work with our current tools?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Almost certainly. We connect Stripe, HubSpot, Notion, Airtable, QuickBooks, Slack, Google Workspace, n8n, Zapier, Make, and 100+ others. If your stack has an API or a webhook, we can automate it."
                }
              },
              {
                "@type": "Question",
                "name": "What does it cost?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Engagements start around $4,500 USD and scale with scope. Most clients recover the cost in the first 60 days through reclaimed hours and reduced billing leakage."
                }
              },
              {
                "@type": "Question",
                "name": "What happens when something breaks?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "We monitor every workflow we ship. If something fails at 3 AM, we get paged, not you. Maintenance is included in the first 90 days; ongoing support is a flat monthly retainer."
                }
              },
              {
                "@type": "Question",
                "name": "Do you replace our team?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. We replace the work nobody on your team should be doing. Your people focus on customers, growth, and judgment calls, the things software can't do."
                }
              },
              {
                "@type": "Question",
                "name": "Is our data safe?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. We work inside your accounts or deploy to your infrastructure, never store credentials in plaintext, and sign an NDA on day one."
                }
              }
            ]
          }
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
