<!doctype html>
<html lang="en" suppresshydrationwarning>
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("aether-theme");
          var dark =
            t === "dark" ||
            (t !== "light" && (t === "system" || !t) && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
          var m = document.getElementById("theme-color-meta");
          if (m) m.setAttribute("content", dark ? "#08080A" : "#f6f5f3");
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta id="theme-color-meta" name="theme-color" content="#08080A" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Privacy-friendly analytics (Plausible): no cookies, no consent banner
         needed, GDPR/LFPDPPP-friendly. Add the site at https://plausible.io and
         it starts reporting; until then it's a harmless no-op. Localhost is
         ignored automatically. The queue stub lets us fire events (see
         src/lib/analytics.ts) before the script finishes loading. -->
    <script defer data-domain="aetherml.com" src="https://plausible.io/js/script.js"></script>
    <script>
      window.plausible = window.plausible || function () { (window.plausible.q = window.plausible.q || []).push(arguments); };
    </script>

    <title>Æther · AI, Automation & Software Studio</title>
    <meta
      name="description"
      content="Æther builds and runs the technology businesses depend on — AI, automation, software, integrations, and security. Based in Guadalajara, working with teams everywhere."
    />
    <meta name="author" content="Æther" />

    <!-- Canonical is asserted per-route via react-helmet-async so each route
         (/, /privacy, /terms, future posts) emits a single, correct canonical
         rather than the homepage URL leaking onto every SPA route. -->
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Æther" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="es_MX" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.aetherml.com/" />
    <meta property="og:title" content="Æther · AI, Automation & Software Studio" />
    <meta
      property="og:description"
      content="Æther builds and runs the technology businesses depend on — AI, automation, software, integrations, and security. Based in Guadalajara, working with teams everywhere."
    />
    <meta
      property="og:image"
      content="https://www.aetherml.com/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Æther — The technical work, off your plate. AI, automation & software studio in Guadalajara." />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@AEtherML" />
    <meta name="twitter:creator" content="@AEtherML" />
    <meta name="twitter:title" content="Æther · AI, Automation & Software Studio" />
    <meta
      name="twitter:description"
      content="Æther builds and runs the technology businesses depend on — AI, automation, software, integrations, and security. Based in Guadalajara, working with teams everywhere."
    />
    <meta
      name="twitter:image"
      content="https://www.aetherml.com/og-image.png"
    />
    <meta name="twitter:image:alt" content="Æther — The technical work, off your plate." />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://www.aetherml.com/#org",
            "name": "Æther",
            "url": "https://www.aetherml.com/",
            "logo": "https://www.aetherml.com/web-app-manifest-512x512.png",
            "sameAs": ["https://twitter.com/AEtherML"],
            "email": "help@aetherml.com",
            "description": "We build and run the technology businesses depend on — AI, automation, software, integrations, and security."
          },
          {
            "@type": "WebSite",
            "@id": "https://www.aetherml.com/#site",
            "url": "https://www.aetherml.com/",
            "name": "Æther",
            "publisher": { "@id": "https://www.aetherml.com/#org" },
            "inLanguage": ["en", "es"]
          },
          {
            "@type": "ProfessionalService",
            "name": "Æther · AI, Automation & Software Studio",
            "provider": { "@id": "https://www.aetherml.com/#org" },
            "areaServed": ["MX", "US", "LATAM"],
            "priceRange": "$$$",
            "serviceType": [
              "AI & Agents",
              "Custom Automations",
              "Custom Software",
              "System Integrations",
              "Payment Reconciliation",
              "Landing Pages & Web",
              "Security & Audits",
              "Training",
              "Process Optimization"
            ]
          },
          {
            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "Do you only do automation?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No — we're a full studio. AI and agents, automation, integrations, custom software and landing pages, security and audits, and training your team to run it all. Automation is often where we start, because it pays for itself fastest, and we build out from there."
                }
              },
              {
                "@type": "Question",
                "name": "How fast do you ship?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "First results live within 2-3 weeks of kickoff. Most engagements deliver measurable hours saved inside 30 days, not the 6-month rollouts you'd get from a traditional agency."
                }
              },
              {
                "@type": "Question",
                "name": "Will this work with our current tools?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Almost certainly. We connect Stripe, HubSpot, Notion, Airtable, QuickBooks, Slack, Google Workspace, n8n, Zapier, Make, and 100+ others. If your stack has an API or a webhook, we can automate, connect, or build on it."
                }
              },
              {
                "@type": "Question",
                "name": "What does it cost?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Engagements start around $4,500 USD and scale with scope. Most clients recover the cost in the first 60 days through reclaimed hours and reduced billing leakage."
                }
              },
              {
                "@type": "Question",
                "name": "What happens when something breaks?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "We monitor every workflow we ship. If something fails at 3 AM, we get paged, not you. Maintenance is included in the first 90 days; ongoing support is a flat monthly retainer."
                }
              },
              {
                "@type": "Question",
                "name": "Do you replace our team?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. We replace the work nobody on your team should be doing. Your people focus on customers, growth, and judgment calls, the things software can't do."
                }
              },
              {
                "@type": "Question",
                "name": "Is our data safe?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. We work inside your accounts or deploy to your infrastructure, never store credentials in plaintext, and sign an NDA on day one."
                }
              }
            ]
          }
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <!-- Static fallback for non-JavaScript user agents (crawlers, app-store /
         OAuth verifiers, link previewers). The app is a client-rendered SPA, so
         without this the body is an empty #root and automated reviewers report
         "the home page does not explain the purpose of your app." This block is
         never shown to real visitors (JS replaces #root), but it gives bots a
         plain-HTML statement of purpose and a working privacy-policy link. -->
    <noscript>
      <main style="max-width:42rem;margin:0 auto;padding:3rem 1.5rem;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.6;color:#111;background:#fff">
        <h1 style="font-size:1.75rem;margin:0 0 .5rem">Æther — AI, Automation &amp; Software Studio</h1>
        <p style="font-size:1.05rem;margin:0 0 1rem">
          Æther builds and runs the technology businesses depend on. We design and
          deliver custom AI and agents, workflow automation, system integrations,
          payment reconciliation, custom software, and security audits — taking the
          repetitive technical work off your team's plate so they can focus on
          customers and growth.
        </p>
        <p style="margin:0 0 1rem">
          We are based in Guadalajara, Mexico, and work with teams everywhere.
          This website explains our services and lets prospective clients get in
          touch. We do not sell a downloadable product or store end-user accounts;
          the only personal data collected is what you choose to send us when you
          contact us.
        </p>
        <p style="margin:0 0 1rem">
          Contact: <a href="mailto:help@aetherml.com">help@aetherml.com</a>
        </p>
        <p style="margin:0">
          <a href="/privacy">Privacy Notice</a> ·
          <a href="/terms">Terms of Service</a>
        </p>
      </main>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
