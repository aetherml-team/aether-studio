<!doctype html>
<html lang="en" suppresshydrationwarning>
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("aether-theme");
          var dark =
            t === "dark" ||
            (t !== "light" && (t === "system" || !t) && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
          var m = document.getElementById("theme-color-meta");
          if (m) m.setAttribute("content", dark ? "#08080A" : "#f6f5f3");
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta id="theme-color-meta" name="theme-color" content="#08080A" />

    <title>Æther — Automations That Save You Time</title>

      name="description"

    />
